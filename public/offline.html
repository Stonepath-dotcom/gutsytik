<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - GetMova</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F0F11;
      color: #f5f5f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #a1a1aa;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #10B981;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #059669; }
    .hint {
      margin-top: 32px;
      font-size: 13px;
      color: #71717a;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 6v6l4 2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="4" y1="4" x2="20" y2="20" stroke="#E52222" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <h1>Kamu Sedang Offline</h1>
  <p>
    Tidak ada koneksi internet saat ini. Pastikan perangkatmu terhubung ke internet lalu coba lagi.
  </p>
  <button class="btn" onclick="window.location.reload()">
    Coba Lagi
  </button>
  <p class="hint">Halaman ini akan otomatis dimuat ulang saat koneksi kembali tersedia.</p>
  <script>
    // Auto-reload when back online
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
